<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="camTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f38"/>
      <stop offset="100%" stop-color="#1a1e26"/>
    </linearGradient>
    <linearGradient id="measureLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a23a" stop-opacity="0"/>
      <stop offset="15%" stop-color="#e8a23a" stop-opacity="1"/>
      <stop offset="85%" stop-color="#e8a23a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e8a23a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background - camera view -->
  <rect width="390" height="844" fill="#0d1117"/>
  <!-- Floor/surface grid -->
  <g opacity="0.15">
    <line x1="0" y1="550" x2="390" y2="400" stroke="#5fb6ad" stroke-width="0.5"/>
    <line x1="0" y1="620" x2="390" y2="470" stroke="#5fb6ad" stroke-width="0.5"/>
    <line x1="0" y1="690" x2="390" y2="540" stroke="#5fb6ad" stroke-width="0.5"/>
    <line x1="0" y1="760" x2="390" y2="610" stroke="#5fb6ad" stroke-width="0.5"/>
    <line x1="0" y1="830" x2="390" y2="680" stroke="#5fb6ad" stroke-width="0.5"/>
  </g>
  <!-- Floor surface -->
  <rect x="0" y="680" width="390" height="164" fill="url(#floor)" opacity="0.4"/>
  <!-- Measurement guide lines -->
  <line x1="80" y1="470" x2="310" y2="470" stroke="url(#measureLine)" stroke-width="2.5"/>
  <line x1="80" y1="300" x2="80" y2="470" stroke="#e8a23a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <line x1="310" y1="300" x2="310" y2="470" stroke="#e8a23a" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Vertical measurement -->
  <line x1="195" y1="300" x2="195" y2="600" stroke="#e8a23a" stroke-width="2"/>
  <line x1="190" y1="600" x2="200" y2="600" stroke="#e8a23a" stroke-width="1.5"/>
  <line x1="190" y1="300" x2="200" y2="300" stroke="#e8a23a" stroke-width="1.5"/>
  <!-- Corner dots -->
  <circle cx="80" cy="470" r="3" fill="#e8a23a"/>
  <circle cx="310" cy="470" r="3" fill="#e8a23a"/>
  <!-- Angle arc -->
  <path d="M 80 470 A 50 50 0 0 0 130 470" fill="none" stroke="#e8a23a" stroke-width="1" opacity="0.4"/>
  <!-- Measurement readout overlay -->
  <rect x="110" y="480" width="170" height="36" rx="8" fill="#13161b" opacity="0.9" stroke="#2a2f38" stroke-width="1"/>
  <text x="195" y="503" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="16" fill="#e8a23a" font-weight="600">47.2 cm</text>
  <!-- Distance readout on line -->
  <rect x="195" y="430" width="16" height="16" rx="8" fill="#e8a23a" opacity="0.2"/>
  <text x="195" y="442" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#e8a23a">H</text>
  <!-- Bottom UI -->
  <rect x="0" y="730" width="390" height="114" fill="#13161b" opacity="0.95"/>
  <rect x="0" y="730" width="390" height="1" fill="#2a2f38"/>
  <!-- Mode buttons -->
  <rect x="60" y="748" width="80" height="30" rx="15" fill="#e8a23a" opacity="0.15" stroke="#e8a23a" stroke-width="1"/>
  <text x="100" y="768" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#e8a23a">Distance</text>
  <rect x="155" y="748" width="55" height="30" rx="15" fill="none" stroke="#2a2f38" stroke-width="1"/>
  <text x="182" y="768" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6c6960">Area</text>
  <rect x="225" y="748" width="55" height="30" rx="15" fill="none" stroke="#2a2f38" stroke-width="1"/>
  <text x="252" y="768" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6c6960">Height</text>
  <!-- Shutter button -->
  <circle cx="195" cy="798" r="22" fill="none" stroke="#e8a23a" stroke-width="3"/>
  <circle cx="195" cy="798" r="18" fill="#e8a23a" opacity="0.15"/>
  <!-- Status bar -->
  <text x="30" y="30" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6c6960" opacity="0.7">10:28</text>
  <text x="360" y="30" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6c6960" opacity="0.7">📶 94%</text>
</svg>

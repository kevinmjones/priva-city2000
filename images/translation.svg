<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bgTrans" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1116"/>
      <stop offset="100%" stop-color="#13161b"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bgTrans)"/>
  <!-- Status bar -->
  <text x="30" y="30" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6c6960" opacity="0.7">10:28</text>
  <text x="360" y="30" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6c6960" opacity="0.7">📶 94%</text>
  <!-- Header -->
  <text x="195" y="65" text-anchor="middle" font-family="'Fraunces', serif" font-size="22" fill="#ece7da">Translation</text>
  <!-- Language selector -->
  <rect x="60" y="85" width="120" height="32" rx="16" fill="#181c23" stroke="#e8a23a" stroke-width="1"/>
  <text x="120" y="106" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#e8a23a">English</text>
  <text x="195" y="106" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#6c6960">→</text>
  <rect x="210" y="85" width="120" height="32" rx="16" fill="#181c23" stroke="#2a2f38" stroke-width="1"/>
  <text x="270" y="106" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a39d8f">Español</text>
  <!-- Input card -->
  <rect x="20" y="135" width="350" height="150" rx="12" fill="#181c23" stroke="#2a2f38" stroke-width="1"/>
  <text x="35" y="160" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6c6960" letter-spacing="1">SOURCE</text>
  <text x="35" y="200" font-family="'Fraunces', serif" font-size="18" fill="#ece7da">Good morning! How are you today?</text>
  <!-- Output card -->
  <rect x="20" y="300" width="350" height="150" rx="12" fill="#181c23" stroke="#e8a23a" stroke-width="1.5"/>
  <text x="35" y="325" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e8a23a" letter-spacing="1">TRANSLATION</text>
  <text x="35" y="365" font-family="'Fraunces', serif" font-size="18" fill="#e8a23a">¡Buenos días! ¿Cómo estás hoy?</text>
  <!-- Action buttons -->
  <rect x="20" y="470" width="55" height="36" rx="10" fill="none" stroke="#2a2f38" stroke-width="1"/>
  <text x="47" y="493" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#a39d8f">📋</text>
  <rect x="85" y="470" width="55" height="36" rx="10" fill="none" stroke="#2a2f38" stroke-width="1"/>
  <text x="112" y="493" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#a39d8f">🔊</text>
  <rect x="150" y="470" width="55" height="36" rx="10" fill="none" stroke="#2a2f38" stroke-width="1"/>
  <text x="177" y="493" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#a39d8f">📤</text>
  <!-- Language list -->
  <text x="195" y="540" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6c6960" letter-spacing="1">LANGUAGES</text>
  <g>
    <rect x="20" y="560" width="170" height="38" rx="8" fill="#181c23" stroke="#2a2f38" stroke-width="0.5"/>
    <text x="35" y="584" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a39d8f">🇫🇷 French</text>
    <rect x="200" y="560" width="170" height="38" rx="8" fill="#181c23" stroke="#2a2f38" stroke-width="0.5"/>
    <text x="215" y="584" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a39d8f">🇩🇪 German</text>
    <rect x="20" y="608" width="170" height="38" rx="8" fill="#181c23" stroke="#2a2f38" stroke-width="0.5"/>
    <text x="35" y="632" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a39d8f">🇯🇵 Japanese</text>
    <rect x="200" y="608" width="170" height="38" rx="8" fill="#181c23" stroke="#2a2f38" stroke-width="0.5"/>
    <text x="215" y="632" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a39d8f">🇨🇳 Chinese</text>
  </g>
</svg>
